services:
  - type: web
    name: smart-gate-system
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: SELF_REGISTRATION_ENABLED
        value: "false"
      - key: ACCOUNT_REQUESTS_ENABLED
        value: "true"
      - key: SMARTGATE_SEED_MODE
        value: never
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "720"
      - key: QR_TTL_MINUTES
        value: "15"
      - key: FACE_AUTH_ENABLED
        value: "true"
      - key: NOTIFICATIONS_ENABLED
        value: "false"
      - key: GEOFENCE_ENABLED
        value: "true"
